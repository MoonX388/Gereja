<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>GerejaDigital - Masuk Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- <script src="/assets/js/auth.js"></script> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/css/auth.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1e3a5f",
              secondary: "#2c5282",
              accent: "#e8c547",
              dark: "#0f1a2e",
              light: "#f7f8fa",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-light font-sans antialiased">
    <div
      class="toast-container fixed top-4 right-4 z-55"
      id="toastContainer"
    ></div>

    <div
      class="min-h-screen flex items-center justify-center px-4 py-4"
      style="
        background-image:
          linear-gradient(
            135deg,
            rgba(15, 26, 46, 0.9) 0%,
            rgba(30, 58, 95, 0.85) 100%
          ),
          url(&quot;/assets/img/church-bg.jpg&quot;);
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
      "
    >
      <div
        class="bg-white rounded-2xl shadow-md border border-gray-100 w-full max-w-md login-card page-transition"
      >
        <div class="text-center pt-5 pb-2">
          <i class="fa-solid fa-church text-4xl text-primary mb-1"></i>
          <h2 class="text-xl font-bold text-dark">GerejaDigital</h2>
          <p class="text-gray-500 text-xs">Sistem Manajemen Gereja</p>
        </div>

        <div class="flex border-b border-gray-200">
          <button
            class="tab-btn active w-1/2 py-2 text-center font-semibold text-sm"
          >
            <i class="fa-solid fa-key mr-1"></i> Masuk Admin
          </button>
          <a
            href="/auth/register"
            target="_parent"
            class="tab-btn w-1/2 py-2 text-center font-semibold text-sm block text-gray-500 hover:bg-gray-50"
          >
            <i class="fa-solid fa-user-plus mr-1"></i> Daftar Anggota
          </a>
        </div>

        <div class="p-5 md:p-6">
          <form id="loginForm">
            <div class="mb-4">
              <label class="block text-sm font-semibold text-gray-700 mb-1">
                <i class="fa-regular fa-envelope mr-1"></i> Email atau Username
              </label>
              <input
                type="text"
                id="loginIdentifier"
                class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary"
                placeholder="admin@gereja.com / admin"
                required
              />
            </div>
            <div class="mb-5">
              <label class="block text-sm font-semibold text-gray-700 mb-1">
                <i class="fa-solid fa-lock mr-1"></i> Password
              </label>
              <input
                type="password"
                id="loginPassword"
                class="w-full p-2 border border-gray-300 rounded-lg focus:outline-none focus:border-primary"
                placeholder="********"
                required
              />
            </div>
            <button
              type="submit"
              id="submitBtn"
              class="w-full bg-primary hover:bg-secondary text-white font-semibold py-2 px-4 rounded-lg transition duration-200 flex items-center justify-center"
            >
              <i class="fa-solid fa-arrow-right-to-bracket mr-2"></i> Masuk
              sebagai Admin
            </button>
          </form>
          <div class="text-center text-xs text-gray-400 mt-5">
            <i class="fa-regular fa-building mr-1"></i> Gunakan akun admin:
            admin / admin123
          </div>
        </div>
      </div>
    </div>

    <script>
      const loginForm = document.getElementById("loginForm");
      const submitBtn = document.getElementById("submitBtn");
      const toastContainer = document.getElementById("toastContainer");

      // 1. Kirim data login ke Next.js saat form disubmit
      loginForm.addEventListener("submit", function (e) {
        e.preventDefault();

        const identifier = document.getElementById("loginIdentifier").value;
        const password = document.getElementById("loginPassword").value;

        // Ubah tombol jadi loading spinner
        submitBtn.disabled = true;
        submitBtn.innerHTML =
          '<i class="fa-solid fa-spinner animate-spin mr-2"></i> Mohon Tunggu...';

        // Kirim data lewat jembatan postMessage
        window.parent.postMessage(
          {
            type: "SUBMIT_LOGIN",
            payload: { identifier, password },
          },
          "*",
        );
      });

      // 2. Terima pesan balik dari Next.js (jika ada error)
      window.addEventListener("message", function (event) {
        if (event.data && event.data.type === "LOGIN_ERROR") {
          // Kembalikan tombol ke status semula
          submitBtn.disabled = false;
          submitBtn.innerHTML =
            '<i class="fa-solid fa-arrow-right-to-bracket mr-2"></i> Masuk sebagai Admin';

          // Munculkan toast error merah custom di dalam iframe
          if (toastContainer) {
            const toast = document.createElement("div");
            toast.className =
              "bg-red-600 text-white text-xs font-semibold px-4 py-3 rounded-xl shadow-lg mb-3 flex items-center transition-all duration-300 balance-content";
            toast.innerHTML = `<i class="fa-solid fa-circle-exclamation mr-2 text-sm"></i> ${event.data.message}`;

            toastContainer.appendChild(toast);

            // Hapus otomatis toast setelah 3.5 detik
            setTimeout(() => {
              toast.style.opacity = "0";
              setTimeout(() => toast.remove(), 300);
            }, 3500);
          }
        }
      });
    </script>
  </body>
</html>
