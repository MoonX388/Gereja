<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=yes"
    />
    <title>GerejaDigital - Daftar Anggota</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/assets/css/auth.css" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: "#1e3a5f",
              secondary: "#2c5282",
              accent: "#e8c547",
              dark: "#0f1a2e",
              light: "#f7f8fa",
            },
          },
        },
      };
    </script>
  </head>
  <body class="bg-light font-sans antialiased">
    <div class="toast-container" id="toastContainer"></div>

    <div
      class="min-h-screen flex items-center justify-center px-4 py-4"
      style="
        background-image:
          linear-gradient(
            135deg,
            rgba(15, 26, 46, 0.9) 0%,
            rgba(30, 58, 95, 0.85) 100%
          ),
          url(&quot;/assets/img/church-bg.jpg&quot;);
        background-size: cover;
        background-position: center;
      "
    >
      <div
        class="bg-white rounded-2xl shadow-md border border-gray-100 w-full max-w-md login-card page-transition"
      >
        <div class="text-center pt-5 pb-2 flex-shrink-0">
          <i class="fa-solid fa-church text-4xl text-primary mb-1"></i>
          <h2 class="text-xl font-bold text-dark">GerejaDigital</h2>
          <p class="text-gray-500 text-xs">Sistem Manajemen Gereja</p>
        </div>

        <div class="flex border-b border-gray-200 flex-shrink-0">
          <a
            href="/auth/login"
            target="_parent"
            class="tab-btn w-1/2 py-2 text-center font-semibold text-sm block text-gray-500 hover:bg-gray-50"
          >
            <i class="fa-solid fa-key mr-1"></i> Masuk Admin
          </a>
          <button
            class="tab-btn active w-1/2 py-2 text-center font-semibold text-sm"
          >
            <i class="fa-solid fa-user-plus mr-1"></i> Daftar Anggota
          </button>
        </div>

        <div class="p-4 md:p-6 flex-1 flex flex-col overflow-hidden h-full">
          <div class="border-b border-gray-200 pb-2 mb-3 flex-shrink-0">
            <h3 class="font-bold text-primary text-sm">
              <i class="fa-solid fa-users mr-1"></i> Form Pendaftaran Anggota
              Jemaat
            </h3>
          </div>
          <div class="scrollable-form">
            <form id="registerForm">
              <div class="grid grid-cols-1 gap-3">
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Nama Lengkap</label
                  ><input
                    type="text"
                    id="regNama"
                    class="form-input py-2 text-sm"
                    placeholder="Nama lengkap"
                  />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Jenis Kelamin</label
                  ><select id="regGender" class="form-select py-2 text-sm">
                    <option value="">Pilih</option>
                    <option value="Pria">Pria</option>
                    <option value="Wanita">Wanita</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Status Baptis</label
                  ><select id="regBaptis" class="form-select py-2 text-sm">
                    <option value="">Pilih</option>
                    <option>Sudah</option>
                    <option>Belum</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Tempat Lahir</label
                  ><input
                    type="text"
                    id="regTempatLahir"
                    class="form-input py-2 text-sm"
                    placeholder="Kota lahir"
                  />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Tanggal Lahir</label
                  ><input
                    type="date"
                    id="regTglLahir"
                    class="form-input py-2 text-sm"
                  />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >No. Telepon</label
                  ><input
                    type="text"
                    id="regTelp"
                    class="form-input py-2 text-sm"
                    placeholder="08xx-xxxx"
                  />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Alamat</label
                  ><textarea
                    id="regAlamat"
                    rows="2"
                    class="form-input py-2 text-sm"
                    placeholder="Alamat lengkap"
                  ></textarea>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Status Pernikahan</label
                  ><select id="regNikah" class="form-select py-2 text-sm">
                    <option value="">Pilih</option>
                    <option>Belum Menikah</option>
                    <option>Menikah</option>
                    <option>Duda/Janda</option>
                  </select>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Pekerjaan</label
                  ><input
                    type="text"
                    id="regPekerjaan"
                    class="form-input py-2 text-sm"
                    placeholder="Pekerjaan"
                  />
                </div>
                <div>
                  <label class="block text-xs font-semibold text-gray-700 mb-1"
                    >Status Keaktifan</label
                  ><select id="regStatus" class="form-select py-2 text-sm">
                    <option value="">Pilih</option>
                    <option>Aktif</option>
                    <option>Pasif</option>
                  </select>
                </div>
              </div>
              <button type="submit" class="btn-primary mt-4 mb-2 py-2 text-sm">
                <i class="fa-solid fa-save mr-1"></i> Daftarkan Anggota
              </button>
            </form>
          </div>
          <div
            class="text-center text-xs text-gray-400 pt-3 mt-1 border-t border-gray-100 flex-shrink-0"
          >
            Sudah terdaftar?
            <a
              href="/login"
              target="_parent"
              class="text-primary font-semibold hover:underline"
              >Masuk sebagai Admin</a
            >
          </div>
        </div>
      </div>
    </div>

    <script src="/assets/js/auth.js"></script>
  </body>
</html>
