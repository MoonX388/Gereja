version: '3.8'

services:
  # ==================== DATABASE ====================
  # SQLite is file-based, no separate service needed
  # Database file stored in backend volume

  # ==================== BACKEND ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gereja-backend
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-your_jwt_secret_key_change_in_production}
      - FRONTEND_URL=http://frontend:3000
      - DATABASE_URL=./database.sqlite
      - BOT_PREFIX=!
      - BOT_ADMIN_PHONE=${BOT_ADMIN_PHONE:-6282158024074@s.whatsapp.net}
      - AI_MODEL=Xenova/Qwen1.5-0.5B-Chat
      - AI_QUANTIZED=true
    volumes:
      # Persist database
      - backend-data:/app
      # Persist bot sessions
      - bot-sessions:/app/LenwySesi
    networks:
      - gereja-network
    depends_on:
      - frontend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==================== FRONTEND ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gereja-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_BACKEND_URL=http://backend:3001
      - NEXT_PUBLIC_APP_NAME=GerejaDigital
    networks:
      - gereja-network
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ==================== NGINX REVERSE PROXY (Optional) ====================
  nginx:
    image: nginx:alpine
    container_name: gereja-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - gereja-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

# ==================== VOLUMES ====================
volumes:
  backend-data:
    driver: local
  bot-sessions:
    driver: local

# ==================== NETWORKS ====================
networks:
  gereja-network:
    driver: bridge
