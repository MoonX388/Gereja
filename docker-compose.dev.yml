version: '3.8'

# Development version with hot-reload
services:
  # ==================== BACKEND (DEV) ====================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: gereja-backend-dev
    ports:
      - "3001:3001"
      - "9229:9229" # Debug port
    environment:
      - NODE_ENV=development
      - PORT=3001
      - JWT_SECRET=dev_secret_key_not_for_production
      - FRONTEND_URL=http://localhost:3000
      - DATABASE_URL=./database.sqlite
    volumes:
      # Hot-reload
      - ./backend/src:/app/src
      - ./backend/node_modules:/app/node_modules
      # Persist data
      - backend-data-dev:/app
      - bot-sessions-dev:/app/LenwySesi
    networks:
      - gereja-network-dev
    restart: unless-stopped
    command: npm run start:dev

  # ==================== FRONTEND (DEV) ====================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: gereja-frontend-dev
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_BACKEND_URL=http://backend:3001
      - NEXT_PUBLIC_APP_NAME=GerejaDigital
    volumes:
      # Hot-reload
      - ./frontend/app:/app/app
      - ./frontend/components:/app/components
      - ./frontend/lib:/app/lib
      - ./frontend/public:/app/public
      - ./frontend/node_modules:/app/node_modules
    networks:
      - gereja-network-dev
    depends_on:
      - backend
    restart: unless-stopped
    command: npm run dev

volumes:
  backend-data-dev:
    driver: local
  bot-sessions-dev:
    driver: local

networks:
  gereja-network-dev:
    driver: bridge
